name: Build n0110 18.2.0
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential imagemagick libfreetype6-dev libjpeg-dev libpng-dev pkg-config
      - name: Install python deps
        run: pip3 install lz4 pypng stringcase
      - name: Install ARM toolchain
        uses: numworks/setup-arm-toolchain@latest
      - name: Build kernel.A.elf and userland.A.elf
        run: |
          make MODEL=n0110 kernel.A.elf
          make MODEL=n0110 userland.A.elf
      - name: Build slot B (kernel.B.elf and userland.B.elf)
        run: |
          make MODEL=n0110 kernel.B.elf
          make MODEL=n0110 userland.B.elf
      - name: Pack DFU and collect artifacts
        run: |
          set -e
          mkdir -p dist
          KA=$(find output -name 'kernel.A.elf' | head -1)
          UA=$(find output -name 'userland.A.elf' | head -1)
          KB=$(find output -name 'kernel.B.elf' | head -1)
          UB=$(find output -name 'userland.B.elf' | head -1)
          echo "Slot A: $KA + $UA"
          echo "Slot B: $KB + $UB"
          python3 build/device/elf2dfu.py -v -i "$KA" "$UA" -o dist/epsilon-18.2.0-n0110-slotA.dfu
          python3 build/device/elf2dfu.py -v -i "$KB" "$UB" -o dist/epsilon-18.2.0-n0110-slotB.dfu
          cp "$KA" "$UA" "$KB" "$UB" dist/
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: epsilon-18.2.0-n0110-dfu
          path: dist/
          if-no-files-found: error
